name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend — Java 21 + Testes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Rodar testes (sem banco — slices @WebMvcTest + H2)
        run: mvn -f backend/pom.xml test --no-transfer-progress

      - name: Publicar relatório de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/

  mobile-typecheck:
    name: Mobile — TypeScript check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: mobile

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: mobile

  admin-build:
    name: Admin — Build Vite + TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: admin

      - name: Build (tsc + vite)
        run: npm run build
        working-directory: admin

  backend-e2e:
    name: Backend — E2E (Testcontainers + PostGIS)
    runs-on: ubuntu-latest
    needs: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Rodar testes E2E (Testcontainers)
        run: mvn -f backend/pom.xml test -Dtest="E2EFluxoPrincipalTest" --no-transfer-progress
        env:
          TESTCONTAINERS_REUSE_ENABLE: 'false'

      - name: Publicar relatório E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-e2e
          path: backend/target/surefire-reports/

  admin-playwright:
    name: Admin — Playwright E2E
    runs-on: ubuntu-latest
    needs: admin-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: admin

      - name: Instalar browsers Playwright
        run: npx playwright install --with-deps chromium
        working-directory: admin

      - name: Rodar testes Playwright
        run: npx playwright test
        working-directory: admin
        env:
          CI: 'true'

      - name: Publicar relatório Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: admin/playwright-report/
