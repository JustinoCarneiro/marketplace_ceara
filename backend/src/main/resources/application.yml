spring:
  application:
    name: marketplace

  # Virtual Threads — Java 21 (TS01)
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/onda_db}
    username: ${POSTGRES_USER:onda_user}
    password: ${POSTGRES_PASSWORD:onda_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    # Desabilitado no M00; configurado com JWT no M01
    user:
      name: ${ADMIN_USER:admin}
      password: ${ADMIN_PASS:changeme}

jwt:
  secret: ${JWT_SECRET}                          # obrigatório em produção (min 32 chars)
  access-token-expiration-ms: 900000             # 15 minutos
  refresh-token-days: 30

cpf:
  encryption-key: ${CPF_ENCRYPTION_KEY}          # obrigatório em produção (min 32 chars, AES-256)

# Actuator — observabilidade base (TS08)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logs estruturados (TS08)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.onda.marketplace: DEBUG
    org.flywaydb: INFO
