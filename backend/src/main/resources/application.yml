spring:
  application:
    name: marketplace

  # Virtual Threads — Java 21 (TS01)
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/onda_db}
    username: ${POSTGRES_USER:onda_user}
    password: ${POSTGRES_PASSWORD:onda_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  security:
    user:
      name: ${ADMIN_USER:admin}
      password: ${ADMIN_PASS:changeme}

  # M12: E-mail (alertas SOS/Disputa/Verificação)
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

jwt:
  secret: ${JWT_SECRET}                          # obrigatório em produção (min 32 chars)
  access-token-expiration-ms: 900000             # 15 minutos
  refresh-token-days: 30

cpf:
  encryption-key: ${CPF_ENCRYPTION_KEY}          # obrigatório em produção (min 32 chars, AES-256)

# M12: destinatário dos alertas operacionais
notification:
  admin-email: ${ADMIN_ALERT_EMAIL:admin@marketplace-ceara.com.br}

marketplace:
  webhook:
    secret: ${MARKETPLACE_WEBHOOK_SECRET}          # obrigatório em produção — segredo compartilhado com gateway
  comissao: ${MARKETPLACE_COMISSAO:0.15}           # percentual padrão (15%)
  outbox:
    delay-ms: ${MARKETPLACE_OUTBOX_DELAY_MS:5000}  # intervalo do OutboxProcessor em ms

# Actuator — observabilidade base (TS08)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false   # SMTP opcional — desabilitado se sem credenciais

# Logs estruturados (TS08)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.onda.marketplace: DEBUG
    org.flywaydb: INFO
