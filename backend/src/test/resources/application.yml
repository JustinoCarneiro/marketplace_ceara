# Configuração de teste — sobrepõe o application.yml principal
spring:
  threads:
    virtual:
      enabled: true   # deve ser testado — mesma config de produção

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false   # Flyway desabilitado nos slices de teste (@WebMvcTest)
  security:
    user:
      name: test
      password: test

jwt:
  secret: "test-secret-key-must-be-at-least-32-chars!!"
  access-token-expiration-ms: 900000
  refresh-token-days: 30

cpf:
  encryption-key: "01234567890123456789012345678901"
